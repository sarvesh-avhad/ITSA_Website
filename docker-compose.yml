version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "3000:3000"
    env_file:
      - ./apps/api/.env
    environment:
      - DATABASE_URL=postgresql://itsa:itsa_pass@postgres:5432/itsa_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    networks:
      - itsa-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: itsa
      POSTGRES_PASSWORD: itsa_pass
      POSTGRES_DB: itsa_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itsa -d itsa_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - itsa-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - itsa-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  itsa-network:
    driver: bridge
